<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Agent Economy</title>
    <style>
      :root {
        --bg: #ffffff;
        --surface: #ffffff;
        --surface-muted: #f6f6f4;
        --border: #deded8;
        --text: #171717;
        --text-muted: #6b6b63;
        --accent: #111111;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: 'Helvetica Neue', Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      .page {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0 40px;
      }

      .topbar,
      .leaderboard,
      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
      }

      .hero {
        display: grid;
        gap: 12px;
        margin-bottom: 24px;
      }

      .eyebrow {
        margin: 0;
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 6vw, 64px);
        line-height: 0.95;
        letter-spacing: -0.05em;
        font-weight: 500;
        max-width: 10ch;
      }

      .subtitle {
        margin: 0;
        max-width: 560px;
        color: var(--text-muted);
        line-height: 1.6;
      }

      .topbar {
        padding: 18px 20px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 20px;
      }

      .controls {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .topbar strong {
        display: block;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .meta {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 8px;
        color: var(--text-muted);
        font-size: 13px;
      }

      .rates {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }

      .rates span {
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--surface-muted);
        color: var(--text-muted);
        font-size: 13px;
      }

      .panels {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
        min-height: 48vh;
        margin-bottom: 20px;
      }

      .panel {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        max-height: 60vh;
        min-height: 0;
      }

      .panel h2 {
        margin: 0;
        padding: 18px 20px 14px;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: var(--text-muted);
        border-bottom: 1px solid var(--border);
      }

      .log {
        padding: 18px 20px 20px;
        overflow: auto;
        white-space: pre-wrap;
        font-size: 13px;
        line-height: 1.65;
        color: #303030;
        font-family: 'SFMono-Regular', 'SF Mono', Consolas, 'Liberation Mono', Menlo, monospace;
        min-height: 0;
        max-height: 100%;
      }

      .leaderboard {
        padding: 12px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      th,
      td {
        border-bottom: 1px solid var(--border);
        padding: 12px 10px;
        text-align: left;
      }

      th {
        color: var(--text-muted);
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      tbody tr:last-child td {
        border-bottom: 0;
      }

      button {
        background: var(--accent);
        color: #fff;
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        cursor: pointer;
        font: inherit;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .status::before {
        content: '';
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: currentColor;
      }

      #status {
        color: var(--text);
      }

      #status.status-live {
        color: #138a36;
      }

      #status.status-paused {
        color: #9a6700;
      }

      #status.status-disconnected {
        color: #b42318;
      }

      @media (max-width: 980px) {
        .panels {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 720px) {
        .page {
          width: min(100vw - 24px, 1120px);
          padding-top: 24px;
        }

        .topbar {
          padding: 16px;
        }

        .leaderboard {
          overflow-x: auto;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="topbar">
        <div>
          <strong>System Overview</strong>
          <div class="meta">
            <span>Status</span>
            <span class="status" id="status">LIVE</span>
          </div>
        </div>
        <div class="rates" id="rates">
          <span>Optimism: --</span>
          <span>Base: --</span>
          <span>Arbitrum: --</span>
        </div>
        <div class="controls">
          <button id="simulateBtn">Simulate Zebra</button>
          <button id="pauseBtn">Pause Agents</button>
        </div>
      </div>

      <div class="panels">
        <section class="panel">
          <h2>Alpha</h2>
          <div class="log" id="alphaLog"></div>
        </section>
        <section class="panel">
          <h2>Gamma</h2>
          <div class="log" id="gammaLog"></div>
        </section>
        <section class="panel">
          <h2>Zebra</h2>
          <div class="log" id="zebraLog"></div>
        </section>
      </div>

      <div class="leaderboard">
        <table>
          <thead>
            <tr>
              <th>Agent</th>
              <th>Net P&amp;L</th>
              <th>Yield Earned</th>
              <th>Fees Paid</th>
              <th>Fees Collected</th>
              <th>Current Chain</th>
              <th>Deployed</th>
              <th>Jobs Executed</th>
            </tr>
          </thead>
          <tbody id="board"></tbody>
        </table>
      </div>
    </main>

    <script>
      const isProduction = __APP_IS_PRODUCTION__;
      const logs = {
        alpha: document.getElementById('alphaLog'),
        gamma: document.getElementById('gammaLog'),
        zebra: document.getElementById('zebraLog'),
      };

      const ratesEl = document.getElementById('rates');
      const boardEl = document.getElementById('board');
      const statusEl = document.getElementById('status');
      const pauseBtn = document.getElementById('pauseBtn');
      const simulateBtn = document.getElementById('simulateBtn');

      if (isProduction) {
        simulateBtn.hidden = true;
      }

      let paused = false;
      const wsProtocol = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws = new WebSocket(`${wsProtocol}://${location.host}`);

      function appendLog(agent, text, ts) {
        const target = logs[agent];
        if (!target) return;
        target.textContent += `[${new Date(ts).toLocaleTimeString()}] ${text}\n`;
        target.scrollTop = target.scrollHeight;
      }

      function num(n) {
        return Number(n || 0).toFixed(6);
      }

      function setStatus(status) {
        statusEl.textContent = status;
        statusEl.className = `status status-${status.toLowerCase()}`;
      }

      function render(state) {
        if (!state) return;

        ratesEl.innerHTML = [
          `Optimism: ${(state.rates.optimism * 100).toFixed(3)}%`,
          `Base: ${(state.rates.base * 100).toFixed(3)}%`,
          `Arbitrum: ${(state.rates.arbitrum * 100).toFixed(3)}%`,
        ]
          .map((r) => `<span>${r}</span>`)
          .join('');

        const a = state.agents.alpha;
        const g = state.agents.gamma;
        const z = state.agents.zebra;

        boardEl.innerHTML = [
          {
            name: 'alpha',
            pnl: a.balance + a.yieldEarned - a.feesPaid,
            y: a.yieldEarned,
            fp: a.feesPaid,
            fc: 0,
            chain: a.currentChain || '-',
            d: a.deployedAmount,
            j: '-',
          },
          {
            name: 'gamma',
            pnl: g.balance + g.yieldEarned - g.feesPaid,
            y: g.yieldEarned,
            fp: g.feesPaid,
            fc: 0,
            chain: g.currentChain || '-',
            d: g.deployedAmount,
            j: '-',
          },
          {
            name: 'zebra',
            pnl: z.balance + z.feesEarned,
            y: 0,
            fp: 0,
            fc: z.feesEarned,
            chain: '-',
            d: 0,
            j: z.jobsExecuted,
          },
        ]
          .map(
            (row) =>
              `<tr>
                <td>${row.name}</td>
                <td>${num(row.pnl)}</td>
                <td>${num(row.y)}</td>
                <td>${num(row.fp)}</td>
                <td>${num(row.fc)}</td>
                <td>${row.chain}</td>
                <td>${num(row.d)}</td>
                <td>${row.j}</td>
              </tr>`,
          )
          .join('');

        paused = !!state.paused;
        setStatus(paused ? 'PAUSED' : 'LIVE');
        pauseBtn.textContent = paused ? 'Resume Agents' : 'Pause Agents';
      }

      pauseBtn.addEventListener('click', () => {
        ws.send(JSON.stringify({ type: 'control', action: 'togglePause' }));
      });

      simulateBtn.addEventListener('click', () => {
        ws.send(JSON.stringify({ type: 'control', action: 'simulateZebra' }));
      });

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.agent === 'alpha' || msg.agent === 'gamma' || msg.agent === 'zebra') {
          appendLog(msg.agent, msg.message, msg.timestamp);
        }
        render(msg.state);
      };

      ws.onclose = () => {
        setStatus('DISCONNECTED');
      };
    </script>
  </body>
</html>
